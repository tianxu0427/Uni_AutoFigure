<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AutoFigure-Edit History</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="history">
    <div class="page">
      <header class="topbar">
        <div>
          <div class="brand">
            <img class="brand-logo" src="/favicon.svg" alt="DeepScientist logo" />
            <span id="historyBrandTitle">History</span>
          </div>
          <div class="subtitle" id="historySubtitle">Saved AutoFigure-Edit outputs.</div>
        </div>
        <div class="topbar-actions">
          <a class="ghost topbar-link" id="historyBackInputBtn" href="/">Back to Method Workflow</a>
          <a class="ghost topbar-link" id="historyBackImportBtn" href="/import.html">Back to Import Workflow</a>
          <button class="ghost" id="historyRefreshBtn" type="button">Refresh</button>
          <div class="lang-switch" data-lang-switch>
            <button type="button" class="lang-chip" data-lang="zh">中文</button>
            <button type="button" class="lang-chip" data-lang="en">EN</button>
          </div>
        </div>
      </header>

      <main class="history-layout">
        <section class="history-summary">
          <div class="panel-header" id="historySummaryTitle">Saved Images</div>
          <div class="history-count" id="historyCount">0 items</div>
        </section>

        <section class="history-grid" id="historyGrid" aria-live="polite"></section>

        <section class="card history-empty" id="historyEmpty" hidden>
          <div class="panel-header" id="historyEmptyTitle">No history yet</div>
          <div class="guide-copy" id="historyEmptyBody">Saved outputs will appear here after a run writes files into outputs/.</div>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
